<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebAudit Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Epilogue:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0e17;
    --bg2:      #0f1522;
    --bg3:      #141c2e;
    --panel:    #111827;
    --border:   rgba(148,163,184,0.1);
    --border2:  rgba(148,163,184,0.18);
    --text:     #e2e8f0;
    --muted:    #64748b;
    --muted2:   #94a3b8;
    --red:      #f87171;
    --orange:   #fb923c;
    --yellow:   #fbbf24;
    --green:    #4ade80;
    --blue:     #60a5fa;
    --cyan:     #22d3ee;
    --purple:   #a78bfa;
    --red-bg:   rgba(248,113,113,0.08);
    --ora-bg:   rgba(251,146,60,0.08);
    --yel-bg:   rgba(251,191,36,0.08);
    --grn-bg:   rgba(74,222,128,0.08);
    --blu-bg:   rgba(96,165,250,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* grid overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,23,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border2);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 14px;
    animation: hdrIn 0.5s ease both;
  }

  @keyframes hdrIn {
    from { transform: translateY(-60px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .logo-badge {
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 10px; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 24px rgba(96,165,250,0.35);
  }

  header h1 {
    font-family: 'Epilogue', sans-serif;
    font-weight: 900; font-size: 1.25rem;
    letter-spacing: -0.03em;
    background: linear-gradient(90deg, var(--text), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.72rem; color: var(--muted); margin-left: auto;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  .layout {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 460px 1fr;
    gap: 0;
    flex: 1;
    min-height: calc(100vh - 68px);
  }

  /* ── INPUT PANEL ── */
  .input-panel {
    background: var(--bg2);
    border-right: 1px solid var(--border2);
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 16px;
    position: sticky; top: 68px;
    height: calc(100vh - 68px);
    overflow-y: auto;
  }

  .input-panel h2 {
    font-family: 'Epilogue', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    letter-spacing: -0.01em;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }

  .input-panel h2 span {
    font-size: 0.68rem; color: var(--muted); font-weight: 400;
    letter-spacing: 0.04em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  textarea {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    line-height: 1.6;
    resize: vertical;
    min-height: 320px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    scrollbar-width: thin;
    scrollbar-color: rgba(96,165,250,0.2) transparent;
  }

  textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.12);
  }

  textarea::placeholder { color: var(--muted); }

  .char-count {
    font-size: 0.68rem; color: var(--muted);
    text-align: right; letter-spacing: 0.04em;
  }

  /* run button */
  .run-btn {
    background: linear-gradient(135deg, #1d4ed8, #0891b2);
    border: none; border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-family: 'Epilogue', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 0.01em;
    position: relative; overflow: hidden;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(29,78,216,0.35);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .run-btn:hover {
    opacity: 0.9; transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(29,78,216,0.5);
  }

  .run-btn:active { transform: translateY(0) scale(0.98); }

  .run-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .run-btn:hover::after { transform: translateX(100%); }

  .run-btn.loading {
    pointer-events: none; opacity: 0.7;
  }

  /* clear btn */
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px;
    color: var(--muted2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .clear-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* check toggles */
  .checks-list {
    display: flex; flex-direction: column; gap: 8px;
  }

  .check-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .check-toggle:hover { border-color: var(--border2); }

  .check-toggle input[type=checkbox] {
    width: 16px; height: 16px; accent-color: var(--blue);
    cursor: pointer; flex-shrink: 0;
  }

  .check-toggle .toggle-icon { font-size: 15px; }
  .check-toggle .toggle-label {
    font-size: 0.78rem; color: var(--text); flex: 1;
  }
  .check-toggle .toggle-desc {
    font-size: 0.65rem; color: var(--muted); letter-spacing: 0.03em;
  }

  /* ── RESULTS PANEL ── */
  .results-panel {
    padding: 28px 28px 60px;
    overflow-y: auto;
  }

  /* empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    gap: 16px; text-align: center;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .empty-state .big-icon { font-size: 56px; opacity: 0.3; }
  .empty-state h3 {
    font-family: 'Epilogue', sans-serif;
    font-weight: 700; font-size: 1.1rem; color: var(--muted2);
  }
  .empty-state p { font-size: 0.75rem; color: var(--muted); max-width: 280px; line-height: 1.6; }

  /* summary bar */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 4px;
    position: relative; overflow: hidden;
    transition: transform 0.2s;
  }

  .summary-card:hover { transform: translateY(-2px); }

  .summary-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-accent, var(--blue));
  }

  .summary-num {
    font-family: 'Epilogue', sans-serif;
    font-weight: 900; font-size: 1.8rem;
    color: var(--card-accent, var(--blue));
    line-height: 1;
  }

  .summary-label {
    font-size: 0.68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  /* section */
  .audit-section {
    margin-bottom: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .audit-section:nth-child(2) { animation-delay: 0.05s; }
  .audit-section:nth-child(3) { animation-delay: 0.1s; }
  .audit-section:nth-child(4) { animation-delay: 0.15s; }
  .audit-section:nth-child(5) { animation-delay: 0.2s; }
  .audit-section:nth-child(6) { animation-delay: 0.25s; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: rgba(255,255,255,0.02); }

  .section-header-icon { font-size: 18px; }
  .section-header-title {
    font-family: 'Epilogue', sans-serif;
    font-weight: 700; font-size: 0.9rem; flex: 1;
  }

  .badge {
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.04em;
  }

  .badge-red    { background: var(--red-bg);  color: var(--red);    border: 1px solid rgba(248,113,113,0.25); }
  .badge-orange { background: var(--ora-bg);  color: var(--orange); border: 1px solid rgba(251,146,60,0.25); }
  .badge-yellow { background: var(--yel-bg);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
  .badge-green  { background: var(--grn-bg);  color: var(--green);  border: 1px solid rgba(74,222,128,0.25); }
  .badge-blue   { background: var(--blu-bg);  color: var(--blue);   border: 1px solid rgba(96,165,250,0.25); }

  .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .collapsed .chevron { transform: rotate(-90deg); }

  .section-body { padding: 12px; }
  .section-body.hidden { display: none; }

  /* issue item */
  .issue-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 6px;
    border: 1px solid transparent;
    transition: background 0.15s;
    font-size: 0.78rem;
    line-height: 1.5;
  }

  .issue-item:last-child { margin-bottom: 0; }

  .issue-item.critical  { background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.15); }
  .issue-item.warning   { background: rgba(251,146,60,0.07);  border-color: rgba(251,146,60,0.15); }
  .issue-item.info      { background: rgba(96,165,250,0.07);  border-color: rgba(96,165,250,0.15); }
  .issue-item.ok        { background: rgba(74,222,128,0.07);  border-color: rgba(74,222,128,0.15); }

  .issue-dot {
    width: 8px; height: 8px;
    border-radius: 50%; flex-shrink: 0; margin-top: 5px;
  }

  .critical .issue-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .warning  .issue-dot { background: var(--orange); }
  .info     .issue-dot { background: var(--blue); }
  .ok       .issue-dot { background: var(--green); }

  .issue-content { flex: 1; min-width: 0; }
  .issue-title { color: var(--text); font-weight: 500; }
  .issue-detail {
    color: var(--muted2); font-size: 0.7rem; margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  code {
    background: rgba(255,255,255,0.06);
    border-radius: 4px; padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    color: var(--cyan);
    word-break: break-all;
  }

  /* spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* progress */
  .progress-bar-wrap {
    background: var(--bg3); border-radius: 8px; height: 6px;
    overflow: hidden; margin-bottom: 20px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    border-radius: 8px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* export btn */
  .export-row {
    display: flex; gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }

  .export-btn {
    padding: 9px 18px;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--muted2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .export-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blu-bg); }

  /* responsive */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .input-panel { position: relative; top: 0; height: auto; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">🔬</div>
  <h1>WebAudit Pro</h1>
  <p>HTML Security &amp; Quality Inspector</p>
</header>

<div class="layout">

  <!-- INPUT PANEL -->
  <aside class="input-panel">
    <h2>HTML Input <span>// paste your page source</span></h2>

    <textarea id="htmlInput" placeholder="Paste your full HTML source here (Ctrl+U → Select All → Copy)…" spellcheck="false" oninput="updateCharCount()"></textarea>
    <div class="char-count" id="charCount">0 characters</div>

    <h2 style="margin-top:4px">Checks <span>// select what to audit</span></h2>
    <div class="checks-list">
      <label class="check-toggle">
        <input type="checkbox" id="chk_xss" checked>
        <span class="toggle-icon">🛡️</span>
        <div>
          <div class="toggle-label">XSS Vulnerabilities</div>
          <div class="toggle-desc">inline scripts, event handlers, data: URIs</div>
        </div>
      </label>
      <label class="check-toggle">
        <input type="checkbox" id="chk_links" checked>
        <span class="toggle-icon">🔗</span>
        <div>
          <div class="toggle-label">Broken Links</div>
          <div class="toggle-desc">empty hrefs, javascript: links, anchors</div>
        </div>
      </label>
      <label class="check-toggle">
        <input type="checkbox" id="chk_images" checked>
        <span class="toggle-icon">🖼️</span>
        <div>
          <div class="toggle-label">Image Issues</div>
          <div class="toggle-desc">missing alt, broken src, lazy loading</div>
        </div>
      </label>
      <label class="check-toggle">
        <input type="checkbox" id="chk_perf" checked>
        <span class="toggle-icon">⚡</span>
        <div>
          <div class="toggle-label">Performance</div>
          <div class="toggle-desc">DOM size, script count, render-blocking</div>
        </div>
      </label>
      <label class="check-toggle">
        <input type="checkbox" id="chk_a11y" checked>
        <span class="toggle-icon">♿</span>
        <div>
          <div class="toggle-label">Accessibility</div>
          <div class="toggle-desc">missing labels, roles, headings, lang</div>
        </div>
      </label>
      <label class="check-toggle">
        <input type="checkbox" id="chk_seo" checked>
        <span class="toggle-icon">🔍</span>
        <div>
          <div class="toggle-label">SEO Basics</div>
          <div class="toggle-desc">title, meta description, canonical, OG tags</div>
        </div>
      </label>
    </div>

    <button class="run-btn" id="runBtn" onclick="runAudit()">
      <span id="runBtnIcon">🚀</span>
      <span id="runBtnText">Run Audit</span>
    </button>
    <button class="clear-btn" onclick="clearAll()">✕ Clear input &amp; results</button>
  </aside>

  <!-- RESULTS PANEL -->
  <section class="results-panel" id="resultsPanel">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🔬</div>
      <h3>Ready to audit</h3>
      <p>Paste your HTML source on the left and click <strong>Run Audit</strong> to detect XSS risks, broken links, image issues, performance problems and more.</p>
    </div>
  </section>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────
function updateCharCount() {
  const v = document.getElementById('htmlInput').value;
  document.getElementById('charCount').textContent = v.length.toLocaleString() + ' characters';
}

function clearAll() {
  document.getElementById('htmlInput').value = '';
  updateCharCount();
  const rp = document.getElementById('resultsPanel');
  rp.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="big-icon">🔬</div>
    <h3>Ready to audit</h3>
    <p>Paste your HTML source on the left and click <strong>Run Audit</strong> to detect XSS risks, broken links, image issues, performance problems and more.</p>
  </div>`;
}

function parseHTML(html) {
  const parser = new DOMParser();
  return parser.parseFromString(html, 'text/html');
}

// ── MAIN AUDIT ───────────────────────────────────────────────────────────────
async function runAudit() {
  const html = document.getElementById('htmlInput').value.trim();
  if (!html) { alert('Please paste some HTML first.'); return; }

  const btn = document.getElementById('runBtn');
  btn.classList.add('loading');
  document.getElementById('runBtnIcon').innerHTML = '<span class="spinner"></span>';
  document.getElementById('runBtnText').textContent = 'Auditing…';

  await sleep(50);

  const doc = parseHTML(html);

  const checks = {
    xss:    document.getElementById('chk_xss').checked,
    links:  document.getElementById('chk_links').checked,
    images: document.getElementById('chk_images').checked,
    perf:   document.getElementById('chk_perf').checked,
    a11y:   document.getElementById('chk_a11y').checked,
    seo:    document.getElementById('chk_seo').checked,
  };

  const results = {};

  if (checks.xss)    results.xss    = checkXSS(html, doc);
  if (checks.links)  results.links  = checkLinks(doc);
  if (checks.images) results.images = checkImages(doc);
  if (checks.perf)   results.perf   = checkPerformance(doc, html);
  if (checks.a11y)   results.a11y   = checkAccessibility(doc);
  if (checks.seo)    results.seo    = checkSEO(doc);

  await sleep(200);

  renderResults(results);

  btn.classList.remove('loading');
  document.getElementById('runBtnIcon').textContent = '✓';
  document.getElementById('runBtnText').textContent = 'Audit Complete';
  setTimeout(() => {
    document.getElementById('runBtnIcon').textContent = '🚀';
    document.getElementById('runBtnText').textContent = 'Run Audit';
  }, 3000);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── XSS CHECK ────────────────────────────────────────────────────────────────
function checkXSS(html, doc) {
  const issues = [];

  // Inline <script> tags (not src)
  doc.querySelectorAll('script:not([src])').forEach((el, i) => {
    const snippet = el.textContent.trim().slice(0, 80);
    issues.push({ level: 'critical', title: 'Inline <script> block detected', detail: snippet || '(empty)', tag: 'XSS' });
  });

  // External scripts from suspicious origins
  doc.querySelectorAll('script[src]').forEach(el => {
    const src = el.getAttribute('src') || '';
    if (/^(javascript:|data:)/i.test(src))
      issues.push({ level: 'critical', title: 'Dangerous script src', detail: src, tag: 'XSS' });
  });

  // Inline event handlers
  const eventHandlerRx = /\s(on\w+)\s*=\s*["']?[^"'\s>]+/gi;
  const handlers = [...html.matchAll(eventHandlerRx)];
  const handlerMap = {};
  handlers.forEach(m => { handlerMap[m[1].toLowerCase()] = true; });
  const handlerList = Object.keys(handlerMap);
  if (handlerList.length)
    issues.push({ level: 'critical', title: `Inline event handlers found (${handlerList.length} types)`, detail: handlerList.map(h=>`on${h.replace(/^on/,'')}`).join(', '), tag: 'XSS' });

  // javascript: href/src
  doc.querySelectorAll('[href^="javascript:"],[src^="javascript:"]').forEach(el => {
    issues.push({ level: 'critical', title: 'javascript: URI detected', detail: el.outerHTML.slice(0,100), tag: 'XSS' });
  });

  // data: URI in iframes/scripts
  doc.querySelectorAll('iframe[src^="data:"],script[src^="data:"]').forEach(el => {
    issues.push({ level: 'critical', title: 'data: URI in iframe/script', detail: el.outerHTML.slice(0,80), tag: 'XSS' });
  });

  // <iframe> elements
  doc.querySelectorAll('iframe').forEach(el => {
    const sandbox = el.getAttribute('sandbox');
    if (!sandbox)
      issues.push({ level: 'warning', title: '<iframe> without sandbox attribute', detail: el.outerHTML.slice(0,100), tag: 'Security' });
  });

  // document.write / eval patterns in raw HTML
  if (/document\.write\s*\(/.test(html))
    issues.push({ level: 'warning', title: 'document.write() usage detected', detail: 'Can be exploited for XSS injection', tag: 'XSS' });
  if (/\beval\s*\(/.test(html))
    issues.push({ level: 'critical', title: 'eval() usage detected', detail: 'Dangerous — allows arbitrary code execution', tag: 'XSS' });
  if (/innerHTML\s*=/.test(html))
    issues.push({ level: 'warning', title: 'innerHTML assignment detected', detail: 'Use textContent or DOMPurify to sanitize', tag: 'XSS' });

  // Missing CSP meta tag
  const csp = doc.querySelector('meta[http-equiv="Content-Security-Policy"]');
  if (!csp)
    issues.push({ level: 'warning', title: 'No Content-Security-Policy meta tag', detail: 'Add a CSP header or meta tag to restrict resource origins', tag: 'Security' });

  // Form action security
  doc.querySelectorAll('form[action]').forEach(el => {
    const action = el.getAttribute('action') || '';
    if (/^javascript:/i.test(action))
      issues.push({ level: 'critical', title: 'Form action uses javascript:', detail: action, tag: 'XSS' });
    if (action.startsWith('http:'))
      issues.push({ level: 'warning', title: 'Form submits to HTTP (not HTTPS)', detail: action, tag: 'Security' });
  });

  if (!issues.length)
    issues.push({ level: 'ok', title: 'No obvious XSS patterns found', detail: 'Basic static analysis passed', tag: 'OK' });

  return { icon: '🛡️', title: 'XSS & Security', issues };
}

// ── LINKS CHECK ───────────────────────────────────────────────────────────────
function checkLinks(doc) {
  const issues = [];

  const links = [...doc.querySelectorAll('a')];
  if (!links.length) {
    issues.push({ level: 'info', title: 'No <a> elements found', detail: 'Page has no hyperlinks', tag: 'Info' });
    return { icon: '🔗', title: 'Links', issues };
  }

  let empty = 0, jsLinks = 0, hash = 0, ext = 0, rel = 0;

  links.forEach(a => {
    const href = a.getAttribute('href');
    const text = a.textContent.trim();

    if (!href || href === '' || href === '#' || href === 'javascript:void(0)') {
      empty++;
      issues.push({ level: 'warning', title: 'Empty or placeholder link', detail: `Text: "${text.slice(0,40) || '(no text)'}"`, tag: 'Links' });
    } else if (/^javascript:/i.test(href)) {
      jsLinks++;
      issues.push({ level: 'critical', title: 'javascript: link', detail: href.slice(0,80), tag: 'XSS' });
    } else if (href.startsWith('http:') && !href.startsWith('http://localhost')) {
      issues.push({ level: 'warning', title: 'Insecure HTTP link', detail: href, tag: 'Security' });
    } else if (href.startsWith('https://') || href.startsWith('http://')) {
      ext++;
      const noRel = !a.getAttribute('rel') || !a.getAttribute('rel').includes('noopener');
      if (a.getAttribute('target') === '_blank' && noRel)
        issues.push({ level: 'warning', title: 'External link opens in _blank without rel="noopener"', detail: href, tag: 'Security' });
    } else if (href.startsWith('#')) {
      hash++;
      const id = href.slice(1);
      if (id && !doc.getElementById(id))
        issues.push({ level: 'warning', title: `Broken anchor: ${href}`, detail: `No element with id="${id}" found`, tag: 'Broken' });
    } else {
      rel++;
    }

    if (!text && !a.querySelector('img') && !a.getAttribute('aria-label'))
      issues.push({ level: 'warning', title: 'Link has no text or accessible label', detail: a.outerHTML.slice(0,80), tag: 'A11y' });
  });

  if (!issues.length)
    issues.push({ level: 'ok', title: `All ${links.length} links look healthy`, detail: '', tag: 'OK' });

  return { icon: '🔗', title: 'Links', issues };
}

// ── IMAGES CHECK ──────────────────────────────────────────────────────────────
function checkImages(doc) {
  const issues = [];
  const imgs = [...doc.querySelectorAll('img')];

  if (!imgs.length) {
    issues.push({ level: 'info', title: 'No <img> elements found', detail: '', tag: 'Info' });
    return { icon: '🖼️', title: 'Images', issues };
  }

  imgs.forEach((img, i) => {
    const src  = img.getAttribute('src') || '';
    const alt  = img.getAttribute('alt');
    const lazy = img.getAttribute('loading');
    const label = src ? src.slice(0,60) : `image #${i+1}`;

    if (!src)
      issues.push({ level: 'critical', title: 'Image missing src attribute', detail: img.outerHTML.slice(0,80), tag: 'Broken' });
    else if (src.startsWith('data:'))
      issues.push({ level: 'info', title: 'Embedded data: URI image', detail: 'Consider hosting externally for cacheability', tag: 'Perf' });

    if (alt === null)
      issues.push({ level: 'critical', title: 'Missing alt attribute', detail: label, tag: 'A11y' });
    else if (alt === '')
      issues.push({ level: 'info', title: 'Empty alt (decorative image?)', detail: label, tag: 'A11y' });

    if (!lazy)
      issues.push({ level: 'info', title: 'No loading="lazy" attribute', detail: label, tag: 'Perf' });

    const w = img.getAttribute('width');
    const h = img.getAttribute('height');
    if (!w || !h)
      issues.push({ level: 'warning', title: 'Missing explicit width/height (causes layout shift)', detail: label, tag: 'Perf' });
  });

  if (issues.every(i => i.level === 'info'))
    issues.unshift({ level: 'ok', title: `${imgs.length} images reviewed — no critical issues`, detail: '', tag: 'OK' });

  return { icon: '🖼️', title: 'Images', issues };
}

// ── PERFORMANCE CHECK ────────────────────────────────────────────────────────
function checkPerformance(doc, html) {
  const issues = [];

  const nodes = doc.querySelectorAll('*').length;
  const scripts = [...doc.querySelectorAll('script')];
  const styles  = [...doc.querySelectorAll('link[rel="stylesheet"]')];
  const inlineStyles = doc.querySelectorAll('[style]').length;

  issues.push({ level: 'info', title: `DOM node count: ${nodes}`, detail: nodes > 1500 ? '⚠ Large DOM — consider pagination/virtualization' : 'Within healthy range', tag: 'DOM' });

  if (nodes > 1500)
    issues.push({ level: 'warning', title: 'Excessive DOM size', detail: `${nodes} nodes. Google recommends < 1500`, tag: 'Perf' });

  const syncScripts = scripts.filter(s => !s.async && !s.defer && s.src);
  if (syncScripts.length)
    issues.push({ level: 'warning', title: `${syncScripts.length} render-blocking <script> tags`, detail: 'Add async or defer attributes', tag: 'Perf' });

  if (scripts.length > 10)
    issues.push({ level: 'warning', title: `${scripts.length} script tags`, detail: 'Bundle scripts to reduce HTTP requests', tag: 'Perf' });
  else
    issues.push({ level: 'ok', title: `Script count: ${scripts.length}`, detail: '', tag: 'OK' });

  if (styles.length > 5)
    issues.push({ level: 'warning', title: `${styles.length} external stylesheets`, detail: 'Consider consolidating CSS files', tag: 'Perf' });
  else
    issues.push({ level: 'ok', title: `Stylesheet count: ${styles.length}`, detail: '', tag: 'OK' });

  if (inlineStyles > 20)
    issues.push({ level: 'warning', title: `${inlineStyles} elements with inline style=""`, detail: 'Prefer CSS classes for maintainability & caching', tag: 'Perf' });

  // Check for large inline SVG
  const svgs = doc.querySelectorAll('svg');
  if (svgs.length > 0)
    issues.push({ level: 'info', title: `${svgs.length} inline SVG element(s)`, detail: 'Inline SVGs > 5KB may inflate page weight', tag: 'Perf' });

  // Resource hints
  const preloads = doc.querySelectorAll('link[rel="preload"]').length;
  if (!preloads)
    issues.push({ level: 'info', title: 'No <link rel="preload"> found', detail: 'Preloading critical resources can improve LCP', tag: 'Perf' });

  // HTML size
  const sizeKB = (html.length / 1024).toFixed(1);
  issues.push({ level: html.length > 100000 ? 'warning' : 'info', title: `HTML size: ${sizeKB} KB`, detail: html.length > 100000 ? 'Large HTML payload — consider server-side compression' : 'Acceptable size', tag: 'Perf' });

  return { icon: '⚡', title: 'Performance', issues };
}

// ── ACCESSIBILITY CHECK ──────────────────────────────────────────────────────
function checkAccessibility(doc) {
  const issues = [];

  // lang attribute
  const htmlEl = doc.documentElement;
  if (!htmlEl.getAttribute('lang'))
    issues.push({ level: 'critical', title: 'Missing lang attribute on <html>', detail: 'Add lang="en" (or appropriate language code)', tag: 'A11y' });
  else
    issues.push({ level: 'ok', title: `lang="${htmlEl.getAttribute('lang')}" set on <html>`, detail: '', tag: 'OK' });

  // Headings
  const h1s = doc.querySelectorAll('h1');
  if (!h1s.length)
    issues.push({ level: 'warning', title: 'No <h1> element found', detail: 'Every page should have exactly one main heading', tag: 'A11y' });
  else if (h1s.length > 1)
    issues.push({ level: 'warning', title: `Multiple <h1> elements (${h1s.length})`, detail: 'Use only one <h1> per page', tag: 'A11y' });
  else
    issues.push({ level: 'ok', title: 'Single <h1> present', detail: h1s[0].textContent.trim().slice(0,60), tag: 'OK' });

  // Form inputs without labels
  doc.querySelectorAll('input, select, textarea').forEach(el => {
    const id = el.getAttribute('id');
    const aria = el.getAttribute('aria-label') || el.getAttribute('aria-labelledby');
    const title = el.getAttribute('title');
    const hasLabel = id && doc.querySelector(`label[for="${id}"]`);
    if (!hasLabel && !aria && !title)
      issues.push({ level: 'critical', title: 'Form control without accessible label', detail: el.outerHTML.slice(0, 80), tag: 'A11y' });
  });

  // Buttons without text
  doc.querySelectorAll('button').forEach(btn => {
    const text = btn.textContent.trim();
    const aria = btn.getAttribute('aria-label');
    if (!text && !aria)
      issues.push({ level: 'critical', title: 'Button with no accessible text', detail: btn.outerHTML.slice(0,80), tag: 'A11y' });
  });

  // Main landmark
  if (!doc.querySelector('main, [role="main"]'))
    issues.push({ level: 'warning', title: 'No <main> landmark', detail: 'Add a <main> element for screen reader navigation', tag: 'A11y' });

  // Skip link
  const skip = doc.querySelector('a[href^="#"]');
  if (!skip)
    issues.push({ level: 'info', title: 'No skip navigation link detected', detail: 'Consider adding a "Skip to content" link', tag: 'A11y' });

  // Tab index abuses
  doc.querySelectorAll('[tabindex]').forEach(el => {
    const ti = parseInt(el.getAttribute('tabindex'));
    if (ti > 0)
      issues.push({ level: 'warning', title: `tabindex="${ti}" — positive tabindex disrupts tab order`, detail: el.outerHTML.slice(0,60), tag: 'A11y' });
  });

  // Color — can't check computed styles without render, flag as info
  issues.push({ level: 'info', title: 'Color contrast cannot be verified statically', detail: 'Use Chrome DevTools or axe browser extension for contrast checks', tag: 'A11y' });

  return { icon: '♿', title: 'Accessibility', issues };
}

// ── SEO CHECK ────────────────────────────────────────────────────────────────
function checkSEO(doc) {
  const issues = [];

  const title = doc.querySelector('title');
  if (!title || !title.textContent.trim())
    issues.push({ level: 'critical', title: 'Missing <title> tag', detail: 'Required for SEO and browser tab display', tag: 'SEO' });
  else {
    const len = title.textContent.trim().length;
    issues.push({ level: len > 60 ? 'warning' : 'ok', title: `Title: "${title.textContent.trim().slice(0,60)}"`, detail: `${len} chars — ideal: 50–60`, tag: 'SEO' });
  }

  const desc = doc.querySelector('meta[name="description"]');
  if (!desc)
    issues.push({ level: 'warning', title: 'Missing meta description', detail: 'Add <meta name="description" content="…"> for search snippets', tag: 'SEO' });
  else {
    const len = (desc.getAttribute('content') || '').length;
    issues.push({ level: len > 160 ? 'warning' : 'ok', title: `Meta description: ${len} chars`, detail: `Ideal: 120–160 chars`, tag: 'SEO' });
  }

  const canonical = doc.querySelector('link[rel="canonical"]');
  if (!canonical)
    issues.push({ level: 'info', title: 'No canonical link', detail: 'Add <link rel="canonical" href="…"> to prevent duplicate content', tag: 'SEO' });

  const viewport = doc.querySelector('meta[name="viewport"]');
  if (!viewport)
    issues.push({ level: 'critical', title: 'Missing viewport meta tag', detail: 'Required for mobile-friendliness and Google ranking', tag: 'SEO' });
  else
    issues.push({ level: 'ok', title: 'Viewport meta tag present', detail: viewport.getAttribute('content'), tag: 'OK' });

  const ogTitle = doc.querySelector('meta[property="og:title"]');
  const ogDesc  = doc.querySelector('meta[property="og:description"]');
  const ogImg   = doc.querySelector('meta[property="og:image"]');
  if (!ogTitle || !ogDesc || !ogImg)
    issues.push({ level: 'info', title: 'Missing Open Graph tags', detail: `og:title ${ogTitle?'✓':'✗'} · og:description ${ogDesc?'✓':'✗'} · og:image ${ogImg?'✓':'✗'}`, tag: 'Social' });
  else
    issues.push({ level: 'ok', title: 'Open Graph tags present', detail: 'og:title, og:description, og:image found', tag: 'OK' });

  const robots = doc.querySelector('meta[name="robots"]');
  if (robots) {
    const content = robots.getAttribute('content') || '';
    if (/noindex/i.test(content))
      issues.push({ level: 'warning', title: 'Page is set to noindex', detail: content, tag: 'SEO' });
  }

  const charset = doc.querySelector('meta[charset]');
  if (!charset)
    issues.push({ level: 'warning', title: 'No charset meta tag', detail: 'Add <meta charset="UTF-8">', tag: 'SEO' });
  else
    issues.push({ level: 'ok', title: `Charset: ${charset.getAttribute('charset')}`, detail: '', tag: 'OK' });

  return { icon: '🔍', title: 'SEO', issues };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderResults(results) {
  const rp = document.getElementById('resultsPanel');
  rp.innerHTML = '';

  // counts
  let crit = 0, warn = 0, info = 0, ok = 0;
  Object.values(results).forEach(r => r.issues.forEach(i => {
    if (i.level === 'critical') crit++;
    else if (i.level === 'warning') warn++;
    else if (i.level === 'info') info++;
    else ok++;
  }));

  // Summary bar
  const bar = document.createElement('div');
  bar.className = 'summary-bar';
  bar.innerHTML = `
    <div class="summary-card" style="--card-accent:var(--red)">
      <div class="summary-num">${crit}</div>
      <div class="summary-label">Critical</div>
    </div>
    <div class="summary-card" style="--card-accent:var(--orange)">
      <div class="summary-num">${warn}</div>
      <div class="summary-label">Warnings</div>
    </div>
    <div class="summary-card" style="--card-accent:var(--blue)">
      <div class="summary-num">${info}</div>
      <div class="summary-label">Info</div>
    </div>
    <div class="summary-card" style="--card-accent:var(--green)">
      <div class="summary-num">${ok}</div>
      <div class="summary-label">Passed</div>
    </div>
  `;
  rp.appendChild(bar);

  // Export row
  const exp = document.createElement('div');
  exp.className = 'export-row';
  exp.innerHTML = `
    <button class="export-btn" onclick="exportJSON()">⬇ Export JSON</button>
    <button class="export-btn" onclick="exportText()">⬇ Export TXT</button>
  `;
  rp.appendChild(exp);

  // Sections
  Object.values(results).forEach(r => {
    const sec = document.createElement('div');
    sec.className = 'audit-section';

    const critCount = r.issues.filter(i=>i.level==='critical').length;
    const warnCount = r.issues.filter(i=>i.level==='warning').length;
    const badge = critCount > 0
      ? `<span class="badge badge-red">${critCount} critical</span>`
      : warnCount > 0
        ? `<span class="badge badge-orange">${warnCount} warning${warnCount>1?'s':''}</span>`
        : `<span class="badge badge-green">Passed</span>`;

    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-header-icon">${r.icon}</span>
        <span class="section-header-title">${r.title}</span>
        ${badge}
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        ${r.issues.map(i => `
          <div class="issue-item ${i.level}">
            <div class="issue-dot"></div>
            <div class="issue-content">
              <div class="issue-title">${escapeHtml(i.title)}</div>
              ${i.detail ? `<div class="issue-detail"><code>${escapeHtml(i.detail)}</code></div>` : ''}
            </div>
            <span class="badge ${badgeClass(i.level)}">${escapeHtml(i.tag)}</span>
          </div>
        `).join('')}
      </div>
    `;
    rp.appendChild(sec);
  });

  // store for export
  window._lastResults = results;
}

function badgeClass(level) {
  return { critical:'badge-red', warning:'badge-orange', info:'badge-blue', ok:'badge-green' }[level] || 'badge-blue';
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const sec  = header.parentElement;
  body.classList.toggle('hidden');
  sec.classList.toggle('collapsed');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportJSON() {
  if (!window._lastResults) return;
  const blob = new Blob([JSON.stringify(window._lastResults, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'webaudit-results.json';
  a.click();
}

function exportText() {
  if (!window._lastResults) return;
  let txt = 'WebAudit Pro — Results\n' + new Date().toLocaleString() + '\n\n';
  Object.values(window._lastResults).forEach(r => {
    txt += `\n══ ${r.title} ══\n`;
    r.issues.forEach(i => {
      txt += `  [${i.level.toUpperCase()}] ${i.title}\n`;
      if (i.detail) txt += `           ${i.detail}\n`;
    });
  });
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'webaudit-results.txt';
  a.click();
}
