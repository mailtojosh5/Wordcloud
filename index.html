<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WordCloud Studio</title>

  <link href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.min.css" rel="stylesheet">

  <style>
    :root {
      --bg1: #070812;
      --bg2: #0e1024;
      --accent: #a855f7;
      --accent2: #22d3ee;
      --glass: rgba(255,255,255,0.06);
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: radial-gradient(circle at top left, #1b1b3a, transparent 40%),
                  radial-gradient(circle at bottom right, #3b0764, transparent 50%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      animation: bgMove 12s ease-in-out infinite alternate;
    }

    @keyframes bgMove {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(20deg); }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/cubes.png');
      opacity: 0.05;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 30px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 3s ease-in-out infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px rgba(168,85,247,0.2); }
      to { text-shadow: 0 0 25px rgba(34,211,238,0.4); }
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(168,85,247,0.2);
    }

    .stFileUploader {
      border: 2px dashed rgba(255,255,255,0.2) !important;
      border-radius: 16px !important;
      padding: 20px;
      background: rgba(255,255,255,0.03) !important;
      transition: all 0.3s ease;
    }

    .stFileUploader:hover {
      border-color: var(--accent);
      box-shadow: 0 0 25px rgba(168,85,247,0.4);
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: floatUp 10s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh) scale(0.5); opacity: 0; }
      to { transform: translateY(-10vh) scale(1); opacity: 0.8; }
    }
  </style>
</head>

<body>

<div id="app"></div>

<!-- floating particles -->
<script>
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (5 + Math.random() * 10) + 's';
  p.style.opacity = Math.random();
  document.body.appendChild(p);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.min.js"></script>
<script>
stlite.mount({
  node: document.getElementById("app"),
  entrypoint: "app.py",
  requirements: ["numpy", "pillow", "matplotlib", "wordcloud"],
  files: {
    "app.py": `
import streamlit as st
from wordcloud import WordCloud
import matplotlib.pyplot as plt
import re
from collections import Counter

st.set_page_config(page_title="WordCloud Studio", layout="centered")

st.markdown("<h1>☁ WordCloud Studio</h1>", unsafe_allow_html=True)

st.markdown("<div class='card'>", unsafe_allow_html=True)
file = st.file_uploader("Upload TXT File", type=["txt"])
st.markdown("</div>", unsafe_allow_html=True)

if file:
    text = file.read().decode("utf-8", errors="ignore")
    words = re.findall(r"[a-zA-Z]{3,}", text.lower())

    if not words:
        st.warning("No valid words found.")
    else:
        freq = Counter(words)

        with st.spinner("Generating magic cloud..."):
            wc = WordCloud(
                width=1000,
                height=500,
                background_color="#0b0c1a",
                colormap="plasma",
                contour_width=2,
                contour_color='#a855f7',
                collocations=False
            ).generate_from_frequencies(freq)

            fig, ax = plt.subplots(figsize=(11, 6))
            fig.patch.set_facecolor('#0b0c1a')
            ax.set_facecolor('#0b0c1a')

            ax.imshow(wc, interpolation='bilinear')
            ax.axis("off")

            st.pyplot(fig, use_container_width=True)
`
  }
});
</script>

</body>
</html>
